<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2PShare Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <img src="icon128.png" alt="P2PShare" class="logo-img">
        <h1>P2PShare Web</h1>
      </div>
      <div id="status-badge" class="status-badge disconnected">Disconnected</div>
    </header>

    <main>
      <!-- Connection Screen -->
      <section id="setup-section" class="card active">
        <div class="card-content">
          <h2>P2P Sharing</h2>
          <p class="subtitle">Direct, secure, no limits. Host to share or enter a code to join.</p>
          
          <div class="action-group">
            <button id="btn-host" class="primary-btn">
              <span class="icon">📡</span> Host to Share
            </button>
            <div class="divider"><span>OR</span></div>
            <div class="input-group">
              <input type="text" id="join-id" placeholder="6-digit code..." inputmode="numeric">
              <button id="btn-join" class="secondary-btn">Join</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Active Connection Screen -->
      <section id="share-section" class="card hidden">
        <div class="card-content">
          <div class="room-info">
            <span class="label">Connected:</span>
            <span id="remote-peer-id" class="code-text">...</span>
          </div>

          <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
              <span class="drop-icon">📁</span>
              <p>Tap to upload or drop here</p>
              <input type="file" id="file-input" hidden multiple>
            </div>
          </div>

          <div id="transfer-list" class="transfer-list"></div>
          
          <button id="btn-disconnect" class="outline-btn">Disconnect</button>
        </div>
      </section>
      
      <!-- Hosting Screen -->
       <section id="hosting-section" class="card hidden">
        <div class="card-content">
          <h2>Room Code</h2>
          <div class="code-display">
            <span id="my-peer-id" class="large-code">------</span>
          </div>
          
          <div id="qrcode-container" class="qrcode-container">
            <!-- QR Code generated here -->
          </div>
          
          <p class="info-text">Scan the QR or share the code above.</p>
          <button id="btn-cancel-host" class="outline-btn">Cancel</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Direct Browser-to-Browser P2P Transfer</p>
    </footer>
  </div>

  <script src="peerjs.min.js"></script>
  <script src="qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
